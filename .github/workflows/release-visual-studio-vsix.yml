name: Release Visual Studio VSIX

on:
  push:
    tags:
      - "*"
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            visualstudio:
              - 'packages/visual-studio/**'
              - 'packages/language-server/bin/**'
              - '.github/workflows/release-visual-studio-vsix.yml'

      - name: Decide whether to run
        id: gate
        run: |
          should_run=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then should_run=true; fi
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then should_run=true; fi
          if [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then should_run=true; fi
          if [[ "${{ steps.changes.outputs.visualstudio }}" == "true" ]]; then should_run=true; fi
          echo "should_run=$should_run" >> $GITHUB_OUTPUT

      - name: Workflow summary
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}"
          echo "paths_filter_visualstudio=${{ steps.changes.outputs.visualstudio }}"
          echo "should_run=${{ steps.gate.outputs.should_run }}"

  build-ls:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build language server binaries
        run: pnpm run build:ls

      - name: Upload language server binaries
        uses: actions/upload-artifact@v4
        with:
          name: language-server-bin
          path: packages/language-server/bin/

  build-vsix:
    needs: [gate, build-ls]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: windows-latest
    env:
      VISUAL_STUDIO_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE }}
      VSIX_OUTPUT_PATH: ${{ github.workspace }}\vsix-output

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download language server binaries
        uses: actions/download-artifact@v4
        with:
          name: language-server-bin
          path: packages/language-server/bin/

      - name: Preflight binary check
        shell: pwsh
        run: |
          Write-Host "Listing packages/language-server/bin contents:"
          Get-ChildItem -Path ./packages/language-server/bin -File | Select-Object Name, Length, LastWriteTime

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Visual Studio extension (Release)
        id: build_vsix
        shell: pwsh
        run: |
          $vsixPath = ./packages/visual-studio/build-vsix.ps1 -OutputPath $env:VSIX_OUTPUT_PATH -Configuration Release
          $vsix = Get-Item $vsixPath
          Write-Host "VSIX created: $($vsix.FullName) ($($vsix.Length) bytes)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "vsix_path=$($vsix.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "vsix_name=$($vsix.Name)"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-studio-vsix
          path: ${{ steps.build_vsix.outputs.vsix_path }}

      - name: Attach VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.build_vsix.outputs.vsix_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Visual Studio extension metadata
        id: vs_meta
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content ./packages/visual-studio/source.extension.vsixmanifest
          $ns = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
          $ns.AddNamespace("vs", "http://schemas.microsoft.com/developer/vsx-schema/2011")

          $identity = $manifest.SelectSingleNode("//vs:PackageManifest/vs:Metadata/vs:Identity", $ns)
          $publisher = $identity.Publisher
          $id = $identity.Id
          $version = $identity.Version
          $itemName = "$publisher.$id"

          "publisher=$publisher" >> $env:GITHUB_OUTPUT
          "id=$id" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "itemName=$itemName" >> $env:GITHUB_OUTPUT

      - name: Workflow summary
        shell: pwsh
        run: |
          $tokenPresent = if ([string]::IsNullOrWhiteSpace("${{ env.VISUAL_STUDIO_MARKETPLACE_TOKEN }}")) { "false" } else { "true" }
          Write-Host "event_name=${{ github.event_name }}"
          Write-Host "ref=${{ github.ref }}"
          Write-Host "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}"
          Write-Host "marketplace_token_present=$tokenPresent"

      - name: Check if Visual Studio extension version exists on Marketplace
        if: env.VISUAL_STUDIO_MARKETPLACE_TOKEN != ''
        id: check_vs_marketplace
        shell: bash
        continue-on-error: true
        run: |
          echo "exists=false" >> $GITHUB_OUTPUT
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json;api-version=3.0-preview.1" \
            -d '{
              "filters": [{
                "criteria": [
                  {"filterType": 7, "value": "${{ steps.vs_meta.outputs.itemName }}"}
                ]
              }],
              "flags": 914
            }' \
            https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery)

          if echo "$RESPONSE" | grep -q '"versions":\['; then
            CURRENT_VERSION=$(echo "$RESPONSE" | grep -o '"version":"${{ steps.vs_meta.outputs.version }}"' || echo "")
            if [ -z "$CURRENT_VERSION" ]; then
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Version does not exist on VS Marketplace"
            else
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Version already exists on VS Marketplace, skipping publish"
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Extension not found on VS Marketplace, will publish"
          fi

      - name: Install VsixPublisher
        if: env.VISUAL_STUDIO_MARKETPLACE_TOKEN != ''
        shell: pwsh
        run: |
          # Prefer the VsixPublisher that ships with the same VSSDK BuildTools NuGet
          # package used to build the VSIX (ensures format compatibility).
          $nugetPkgs = if ($env:NUGET_PACKAGES) { $env:NUGET_PACKAGES } else { Join-Path $env:USERPROFILE '.nuget\packages' }
          $nugetVsixPub = Get-ChildItem -Path $nugetPkgs -Recurse -Filter "VsixPublisher.exe" -ErrorAction SilentlyContinue |
            Sort-Object { $_.Directory.FullName } -Descending | Select-Object -First 1

          if ($nugetVsixPub) {
            Write-Host "VsixPublisher (NuGet): $($nugetVsixPub.FullName)"
            "VSIX_PUBLISHER_PATH=$($nugetVsixPub.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            # Fall back to the one bundled with VS
            $vsVsixPub = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "VsixPublisher.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($vsVsixPub) {
              Write-Host "VsixPublisher (VS install): $($vsVsixPub.FullName)"
              "VSIX_PUBLISHER_PATH=$($vsVsixPub.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              Write-Error "VsixPublisher.exe not found"
              exit 1
            }
          }

      - name: Inspect VSIX contents
        shell: pwsh
        run: |
          $vsixPath = "${{ steps.build_vsix.outputs.vsix_path }}"
          Write-Host "=== VSIX File ==="
          $vsixFile = Get-Item $vsixPath
          Write-Host "Path: $($vsixFile.FullName)"
          Write-Host "Size: $($vsixFile.Length) bytes"
          Write-Host ""

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($vsixPath)

          Write-Host "=== All entries ==="
          foreach ($entry in $zip.Entries) {
            Write-Host "  $($entry.FullName)  ($($entry.Length) bytes)"
          }
          Write-Host ""

          # Extract and display key files
          foreach ($name in @('extension.vsixmanifest', '[Content_Types].xml', 'catalog.json', 'manifest.json')) {
            $entry = $zip.GetEntry($name)
            if ($entry) {
              $reader = New-Object System.IO.StreamReader($entry.Open())
              $content = $reader.ReadToEnd()
              $reader.Dispose()
              Write-Host "=== $name ==="
              Write-Host $content
              Write-Host ""
            } else {
              Write-Host "=== $($name): MISSING ==="
              Write-Host ""
            }
          }
          $zip.Dispose()

      - name: Validate VSIX package
        if: env.VISUAL_STUDIO_MARKETPLACE_TOKEN != ''
        shell: pwsh
        run: |
          $vsixPath = "${{ steps.build_vsix.outputs.vsix_path }}"
          $internalName = ("${{ steps.vs_meta.outputs.id }}" -replace '[^a-zA-Z0-9-]', '-')
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($vsixPath)
          $entries = $zip.Entries | Select-Object -ExpandProperty FullName
          $zip.Dispose()

          $requiredFiles = @('extension.vsixmanifest', '[Content_Types].xml', 'catalog.json', 'manifest.json')
          foreach ($f in $requiredFiles) {
            if ($entries -notcontains $f) { Write-Error "VSIX v3 validation failed - missing required file: $f"; exit 1 }
            Write-Host "OK: $f"
          }
          if ($internalName.Length -ge 63) { Write-Error "internalName too long"; exit 1 }
          if ($internalName -notmatch '^[a-zA-Z0-9][a-zA-Z0-9-]*$') { Write-Error "internalName invalid: $internalName"; exit 1 }
          Write-Host "OK: publisher=${{ steps.vs_meta.outputs.publisher }}, internalName=$internalName"
          Write-Host "Validation passed"


      - name: Publish VSIX to Visual Studio Marketplace
        if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch') && env.VISUAL_STUDIO_MARKETPLACE_TOKEN != '' && steps.check_vs_marketplace.outputs.exists == 'false'
        shell: pwsh
        run: |
          $vsixPath = "${{ steps.build_vsix.outputs.vsix_path }}"
          $publisher = "${{ steps.vs_meta.outputs.publisher }}"
          $pat = "${{ env.VISUAL_STUDIO_MARKETPLACE_TOKEN }}"

          Write-Host "Publishing VSIX to Visual Studio Marketplace..."
          Write-Host "Publisher: $publisher"
          Write-Host "VSIX Path: $vsixPath"
          Write-Host "VSIX Size: $((Get-Item $vsixPath).Length) bytes"

          # Copy README for marketplace overview
          $readmePath = Join-Path $env:GITHUB_WORKSPACE "packages\visual-studio\README.md"
          if (-not (Test-Path $readmePath)) {
            $readmePath = Join-Path $env:GITHUB_WORKSPACE "README.md"
          }
          $readmeDestPath = Join-Path $env:TEMP "README.md"
          if (Test-Path $readmePath) {
            Copy-Item $readmePath $readmeDestPath
            Write-Host "README.md copied for publishing"
          } else {
            Write-Warning "README.md not found, publishing without overview"
          }

          $manifest = @{
            '$schema' = 'http://json.schemastore.org/vsix-publish'
            categories = @('Other')
            identity = @{
              internalName = ("${{ steps.vs_meta.outputs.id }}" -replace '[^a-zA-Z0-9-]', '-')
            }
            priceCategory = 'free'
            publisher = $publisher
            private = $false
            qna = $true
            repo = 'https://github.com/wc-toolkit/wc-language-server'
          }
          if (Test-Path $readmeDestPath) {
            $manifest['overview'] = 'README.md'
          }
          $manifestPath = Join-Path $env:TEMP 'publishManifest.json'
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path $manifestPath
          Write-Host "Publish manifest:"
          Get-Content $manifestPath | Write-Host

          # --- Attempt 1: REST API (gives detailed error body) ---
          Write-Host "`n=== Attempting publish via REST API ==="
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))
          $vsixBytes = [System.IO.File]::ReadAllBytes($vsixPath)

          try {
            $response = Invoke-WebRequest `
              -Uri "https://marketplace.visualstudio.com/_apis/gallery/publishers/$publisher/extensions?api-version=7.1-preview.1" `
              -Method Post `
              -Headers @{ Authorization = "Basic $base64Auth" } `
              -ContentType 'application/octet-stream' `
              -Body $vsixBytes `
              -UseBasicParsing `
              -ErrorAction Stop

            Write-Host "REST API publish succeeded (HTTP $($response.StatusCode))"
            exit 0
          }
          catch {
            $errResp = $_.Exception.Response
            if ($errResp) {
              $status = [int]$errResp.StatusCode
              try {
                $errStream = $errResp.GetResponseStream()
                $errReader = New-Object System.IO.StreamReader($errStream)
                $errBody = $errReader.ReadToEnd()
                $errReader.Dispose()
              } catch { $errBody = '(could not read response body)' }
              Write-Host "REST API failed (HTTP $status):"
              Write-Host $errBody

              # If 409 Conflict, the extension version already exists
              if ($status -eq 409) {
                Write-Host "Version already exists on marketplace, treating as success."
                exit 0
              }
            } else {
              Write-Host "REST API error: $_"
            }
          }

          # --- Attempt 2: VsixPublisher (fallback) ---
          Write-Host "`n=== Falling back to VsixPublisher ==="
          Write-Host "VsixPublisher Path: $env:VSIX_PUBLISHER_PATH"

          try {
              & $env:VSIX_PUBLISHER_PATH publish `
                -payload $vsixPath `
                -publishManifest $manifestPath `
                -personalAccessToken $pat `
                -ignoreWarnings "VSIXValidatorWarning01,VSIXValidatorWarning02,VSIXValidatorWarning08"

              if ($LASTEXITCODE -eq 0) {
                Write-Host "Successfully published via VsixPublisher"
              } else {
                Write-Error "VsixPublisher failed with exit code: $LASTEXITCODE"
                exit 1
              }
          }
          catch {
              Write-Error "Failed to publish VSIX: $_"
              exit 1
          }
